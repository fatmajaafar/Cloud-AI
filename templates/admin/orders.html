{% extends "base.html" %}
{% block content %}
<h2>Gestion des commandes</h2>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Client</th>
            <th>Total</th>
            <th>Statut</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for order in orders %}
        <tr>
            <td>{{ order[0] }}</td>
            <td>{{ order[7] }}</td>
            <td>{{ order[2] }} €</td>
            <td>
                <span class="badge bg-{{ 'warning' if order[3] == 'En attente' else 'success' if order[3] == 'Expédiée' else 'info' }}">
                    {{ order[3] }}
                </span>
            </td>
            <td>{{ order[6] }}</td>
            <td>
                <form method="POST" action="{{ url_for('admin.update_order_status', order_id=order[0]) }}">
                    <select name="status" class="form-select form-select-sm d-inline w-auto">
                        <option value="En attente" {% if order[3] == 'En attente' %}selected{% endif %}>En attente</option>
                        <option value="En préparation" {% if order[3] == 'En préparation' %}selected{% endif %}>En préparation</option>
                        <option value="Expédiée" {% if order[3] == 'Expédiée' %}selected{% endif %}>Expédiée</option>
                        <option value="Livrée" {% if order[3] == 'Livrée' %}selected{% endif %}>Livrée</option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-primary">Mettre à jour</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
