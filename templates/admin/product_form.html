{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">

<h2>{% if action == 'add' %}➕ Ajouter un produit{% else %}✏️ Modifier le produit{% endif %}</h2>

<div class="card shadow-sm">
<div class="card-body">
<form method="POST">

    <div class="mb-3">
        <label class="form-label">Nom <span class="text-danger">*</span></label>
        <input type="text" class="form-control" name="name"
               value="{{ product[1] if product else '' }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" name="description" rows="3">{{ product[2] if product else '' }}</textarea>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Prix (€) <span class="text-danger">*</span></label>
            <input type="number" step="0.01" min="0" class="form-control" name="price"
                   value="{{ product[3] if product else '0.00' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Stock <span class="text-danger">*</span></label>
            <input type="number" min="0" class="form-control" name="stock"
                   value="{{ product[4] if product else '0' }}" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">URL de l'image</label>
        <input type="url" class="form-control" name="image_url"
               value="{{ product[5] if product else '' }}"
               placeholder="https://exemple.com/image.jpg"
               id="imageUrl"
               oninput="previewImage(this.value)">
        <div class="mt-2">
            <img id="imagePreview"
     src="{{ product[5] if product and product[5] else '' }}"
     alt="Aperçu"
     class="mt-2 rounded"
     style="max-height:120px;"
     {% if not product or not product[5] %}hidden{% endif %}>
        </div>
    </div>

    <div class="d-flex justify-content-between mt-4">
        <a href="{{ url_for('admin.products') }}" class="btn btn-secondary">← Annuler</a>
        <button type="submit" class="btn btn-success">
            {% if action == 'add' %}➕ Ajouter{% else %}💾 Enregistrer{% endif %}
        </button>
    </div>

</form>
</div>
</div>

</div>
</div>

<script>
function previewImage(url) {
    const img = document.getElementById('imagePreview');
    if (url) {
        img.src = url;
        img.style.display = 'block';
    } else {
        img.style.display = 'none';
    }
}
</script>

{% endblock %}
