{% extends "base.html" %}
{% block content %}
<h1>Nos produits</h1>
<div class="row">
    {% for product in products %}
    <div class="col-md-3 mb-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ product[1] }}</h5>
                <p class="card-text">{{ product[2][:50] }}...</p>
                <p class="card-text"><strong>{{ product[3] }} €</strong></p>
                <p>Stock: {{ product[4] }}</p>
                <a href="{{ url_for('products.detail', product_id=product[0]) }}" class="btn btn-sm btn-outline-primary">Voir détails</a>
                <a href="{{ url_for('cart.add_to_cart_route', product_id=product[0]) }}" class="btn btn-sm btn-primary">Ajouter au panier</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
